<header class="navbar">
  <div class="navbar-row">
    <div class="brand" aria-label="DataFood home">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M19.8 4.2C15 3.4 12.4 6 11.1 8.3c-1.4 2.5-1.5 5.4-1.5 6.8V20h2.2v-3.8c1.5-.1 4.7-.6 7-2.7 2.2-2.1 3-5.4 2.4-9.5-.1-.3-.2-.6-.6-.6-.3 0-.6.1-.8.2z" fill="currentColor"/>
      </svg>
      <span>DataFood</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="text"
        class="search"
        placeholder="Cerca prodotti freschi, marca o reparto"
        [(ngModel)]="searchText"
        (input)="onSearchInput()"
      />
    </div>

    <button class="user-button" type="button" aria-label="Profilo utente">
      <span>U</span>
    </button>
  </div>
</header>
