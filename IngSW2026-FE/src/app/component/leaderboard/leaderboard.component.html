<div class="leaderboard-container">
  <div class="leaderboard-header">
    <h1>🏆 Classifica Punti</h1>
    <p class="subtitle">Top 100 utenti per punti totali accumulati</p>
  </div>

  <div *ngIf="isLoading" class="loading">
    <p>Caricamento della classifica...</p>
  </div>

  <div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
  </div>

  <div *ngIf="!isLoading && !error" class="leaderboard-content">
    <div *ngIf="leaderboard.length === 0" class="empty-state">
      <p>Nessun utente nella classifica</p>
    </div>

    <table *ngIf="leaderboard.length > 0" class="leaderboard-table">
      <thead>
        <tr>
          <th class="col-position">Pos.</th>
          <th class="col-user">Utente</th>
          <th class="col-points">Punti</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of leaderboard" class="leaderboard-row" [class.top-3]="entry.position <= 3">
          <td class="col-position">
            <span *ngIf="entry.position <= 3" class="medal">{{ entry.badge }}</span>
            <span *ngIf="entry.position > 3" class="position-number">#{{ entry.position }}</span>
          </td>
          <td class="col-user">{{ entry.username }}</td>
          <td class="col-points">{{ entry.puntiTotali }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
